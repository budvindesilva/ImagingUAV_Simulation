# =============================================================================
# EPC901 Receiver (Central) — nRF5340 / NCS v3.1.1
# =============================================================================

# --- Bluetooth Role ---
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_DEVICE_NAME="EPC901_Receiver"

# --- Connection Limits ---
CONFIG_BT_MAX_CONN=1

# --- GATT Client ---
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_GATT_AUTO_DISCOVER_CCC=y

# --- Data Length Extension ---
CONFIG_BT_USER_DATA_LEN_UPDATE=y
CONFIG_BT_DATA_LEN_UPDATE=y

# --- MTU & Buffer Sizing ---
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251

# --- Buffer Counts (matched to network core defaults) ---
CONFIG_BT_BUF_ACL_TX_COUNT=3
CONFIG_BT_CONN_TX_MAX=3
CONFIG_BT_BUF_EVT_RX_COUNT=4

# --- Stack Sizes (increased to prevent crash during 3-pass discovery) ---
CONFIG_BT_RX_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096

CONFIG_LOG_BACKEND_RTT=n
CONFIG_LOG_BACKEND_UART=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG=y

CONFIG_BT_GATT_AUTO_RESUBSCRIBE=y
CONFIG_BT_ATT_TX_COUNT=10