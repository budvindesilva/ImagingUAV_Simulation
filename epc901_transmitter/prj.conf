# =============================================================================
# EPC901 Transmitter (Peripheral) — nRF5340 / NCS v3.1.1
# =============================================================================

# --- Bluetooth Role ---
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="EPC901_TX"
# CONFIG_BT_GATT_CLIENT is NOT needed — this device is peripheral only.

# --- Connection Limits ---
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1

# --- Data Length Extension (244-byte payloads require MTU 247) ---
# Controller-side max PDU size
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# Host ACL buffer sizing — TX_SIZE must be >= CTLR_DATA_LENGTH_MAX
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251

# --- Buffer Counts ---
# Rule: BT_BUF_EVT_RX_COUNT > BT_BUF_ACL_TX_COUNT
CONFIG_BT_BUF_ACL_TX_COUNT=3
CONFIG_BT_BUF_EVT_RX_COUNT=4
CONFIG_BT_CTLR_RX_BUFFERS=11

# --- Stack Sizes ---
# Burst thread is defined with 4096 in code; workqueue needs headroom for
# sampling work handler (mutex, packing, store_buffer).
CONFIG_BT_RX_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=2048

# --- Logging ---
CONFIG_LOG=y

# --- Memory ---
CONFIG_HEAP_MEM_POOL_SIZE=4096