# =============================================================================
# EPC901 Transmitter (Peripheral) — nRF54L15 / NCS v3.1.1
# =============================================================================

# --- Bluetooth Role ---
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="EPC901_TX"

# --- Connection Limits ---
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1

# --- Data Length Extension (244-byte payloads require MTU 247) ---
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251

# --- Buffer Counts ---
CONFIG_BT_BUF_ACL_TX_COUNT=3
CONFIG_BT_BUF_EVT_RX_COUNT=4

# --- Stack Sizes ---
CONFIG_BT_RX_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=2048

# --- Logging ---
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_UART_CONSOLE=y

# --- Memory ---
CONFIG_HEAP_MEM_POOL_SIZE=4096

# --- nrfx hardware drivers ---
CONFIG_NRFX_SAADC=y
CONFIG_NRFX_TIMER22=y
CONFIG_NRFX_GPPI=y

# --- GPIO and I2C for EPC901 ---
CONFIG_GPIO=y
CONFIG_I2C=y